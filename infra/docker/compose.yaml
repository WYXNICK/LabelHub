services:
  mysql:
    image: mysql:8.4
    container_name: labelhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: labelhub
      MYSQL_USER: labelhub
      MYSQL_PASSWORD: labelhub
    ports:
      - "3306:3306"
    volumes:
      - labelhub_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ulabelhub", "-plabelhub"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: labelhub-redis
    ports:
      - "6379:6379"
    volumes:
      - labelhub_redis_data:/data

volumes:
  labelhub_mysql_data:
  labelhub_redis_data:
